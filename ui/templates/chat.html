{% extends "base.html" %}

{% block title %}PeerChat UI{% endblock %}

{% block content %}
<!-- Top connection bar -->
<section class="connection-bar">
  {% include "partials/connect_state.html" with context %}
</section>

<!-- Main layout: left users box, right chat window -->
<div class="main-grid">
  <aside id="users-box" class="users-box">
    {% include "partials/users_list.html" %}
  </aside>

  <section class="chat-card">
    <section id="message-stream" class="message-stream" aria-live="polite">
      {% include "partials/message_list.html" %}
    </section>

    <form
      id="composer-form"
      class="composer"
      hx-post="{{ url_for('post_message') }}"
      hx-target="#message-stream"
      hx-swap="innerHTML"
    >
      <label class="sr-only" for="message">Message</label>
      <textarea id="message" name="message" rows="3" placeholder="Write a message..."></textarea>
      <div class="composer-actions">
        <p class="hint">Enter a message to simulate the chat flow.</p>
        <button type="submit">Send</button>
      </div>
    </form>
  </section>
</div>

<script>
  (() => {
    const composerForm = document.getElementById("composer-form");
    const messageInput = document.getElementById("message");
    const draftStorageKey = `peerchat:draft`;
    const hasStorage = typeof window.localStorage !== "undefined";

    if (!composerForm || !messageInput) {
      return;
    }

    const saveDraft = () => {
      if (!hasStorage) return;
      if (messageInput.value) {
        window.localStorage.setItem(draftStorageKey, messageInput.value);
        return;
      }
      window.localStorage.removeItem(draftStorageKey);
    };

    const restoreDraft = () => {
      if (!hasStorage) return;
      const savedDraft = window.localStorage.getItem(draftStorageKey);
      if (savedDraft) messageInput.value = savedDraft;
    };

    const clearDraft = () => {
      if (!hasStorage) return;
      window.localStorage.removeItem(draftStorageKey);
    };

    restoreDraft();

    const isTypingTarget = (target) => {
      if (!(target instanceof HTMLElement)) {
        return false;
      }

      if (target.isContentEditable) {
        return true;
      }

      return target.matches("input, textarea, select");
    };

    messageInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" || event.shiftKey || event.isComposing) {
        return;
      }

      event.preventDefault();

      if (!messageInput.value.trim()) {
        return;
      }

      composerForm.requestSubmit();
    });

    messageInput.addEventListener("input", () => {
      saveDraft();
    });

    document.addEventListener("keydown", (event) => {
      if (event.defaultPrevented || event.altKey || event.ctrlKey || event.metaKey) {
        return;
      }

      if (event.key === "/" && !isTypingTarget(event.target)) {
        event.preventDefault();
        messageInput.focus();
        messageInput.setSelectionRange(messageInput.value.length, messageInput.value.length);
        return;
      }

      if (event.key === "Escape") {
        messageInput.value = "";
        clearDraft();
      }
    });

    composerForm.addEventListener("htmx:afterRequest", (event) => {
      if (event.target !== composerForm || !event.detail.successful) {
        return;
      }

      messageInput.value = "";
      clearDraft();
      messageInput.focus();
    });
  })();
</script>
<script>
  // Toggle the connect form state after HTMX requests to /connect or /disconnect
  document.addEventListener('htmx:afterRequest', (evt) => {
    try {
      const frm = evt.target;
      if (!(frm instanceof HTMLElement)) return;
      if (!frm.classList || !frm.classList.contains('connect-form')) return;
      if (!evt.detail || !evt.detail.path) return;

      const path = evt.detail.path;
      const usernameInput = frm.querySelector('input[name="username"]');
      const ipInput = frm.querySelector('input[name="ip"]');
      const submit = frm.querySelector('button[type="submit"]');

      if (path && path.indexOf('/connect') !== -1 && evt.detail.successful) {
        if (usernameInput) usernameInput.setAttribute('readonly', '');
        if (ipInput) ipInput.setAttribute('readonly', '');
        if (submit) {
          submit.textContent = 'Disconnect';
          // change form to post to /disconnect on next submit
          frm.setAttribute('hx-post', '{{ url_for("disconnect") }}');
          frm.action = '{{ url_for("disconnect") }}';
        }
      }

      if (path && path.indexOf('/disconnect') !== -1 && evt.detail.successful) {
        if (usernameInput) usernameInput.removeAttribute('readonly');
        if (ipInput) ipInput.removeAttribute('readonly');
        if (submit) {
          submit.textContent = 'Connect';
          frm.setAttribute('hx-post', '{{ url_for("connect") }}');
          frm.action = '{{ url_for("connect") }}';
        }
      }
    } catch (e) {
      // fail silently — UI behavior is non-critical
      console.error(e);
    }
  });
</script>
{% endblock %}
