<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Chat UI{% endblock %}</title>
    <script>
      (() => {
        const storageKey = "peerchat:theme";
        const root = document.documentElement;
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

        try {
          const savedTheme = window.localStorage.getItem(storageKey);
          if (savedTheme === "light" || savedTheme === "dark") {
            root.setAttribute("data-theme", savedTheme);
            return;
          }
        } catch (error) {
          // Ignore localStorage access errors and fall back to system preference.
        }

        root.setAttribute("data-theme", prefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="icon" type="image/svg+xml" sizes="any" href="{{ url_for('static', filename='assets/favicon.svg') }}?v=2">
    <link rel="shortcut icon" href="{{ url_for('static', filename='assets/favicon.svg') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
